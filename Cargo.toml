[workspace]
resolver = "2"
members = [
    "crates/tensogram-core",
    "crates/tensogram-encodings",
    "crates/tensogram-cli",
    "crates/tensogram-ffi",
    "examples/rust",
]
# tensogram-python is built via `maturin develop` (PyO3 extension modules
# require the Python linker). It is excluded from default workspace builds.
exclude = [
    "crates/tensogram-python",
]

[workspace.dependencies]
thiserror = "2"
ciborium = "0.2"
serde = { version = "1", features = ["derive"] }
xxhash-rust = { version = "0.8", features = ["xxh3"] }
sha1 = "0.10"
md5 = "0.7"
clap = { version = "4", features = ["derive"] }
serde_json = "1"
libaec-sys = "0.1"
zstd = "0.13"
lz4_flex = "0.11"
blosc2 = { version = "0.2", default-features = false }
zfp-sys-cc = "0.2"
sz3 = "0.4"
