language = "C"
include_guard = "TENSOGRAM_H"
header = "/* Tensogram C API — generated by cbindgen. Do not edit. */"
style = "type"
usize_is_size_t = true

[export]
# No global prefix — types use [export.rename] for clean tgm_ names.
# Functions use explicit #[no_mangle] names in Rust.

[export.rename]
# Error enum uses no _t suffix so prefix_with_name produces TGM_ERROR_OK not TGM_ERROR_T_OK
"TgmError" = "tgm_error"
"TgmBytes" = "tgm_bytes_t"
"TgmMessage" = "tgm_message_t"
"TgmMetadata" = "tgm_metadata_t"
"TgmFile" = "tgm_file_t"
"TgmScanResult" = "tgm_scan_result_t"
"TgmScanEntry" = "tgm_scan_entry_t"
"TgmBufferIter" = "tgm_buffer_iter_t"
"TgmFileIter" = "tgm_file_iter_t"
"TgmObjectIter" = "tgm_object_iter_t"
"TgmStreamingEncoder" = "tgm_streaming_encoder_t"

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true
