[package]
name = "tensogram-szip"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Pure-Rust CCSDS 121.0-B-3 Adaptive Entropy Coding (AEC/SZIP) — encode, decode, and range decode"
documentation = "https://docs.rs/tensogram-szip"
readme = "README.md"
keywords = ["szip", "aec", "compression", "entropy-coding", "scientific-data"]
categories = ["science", "compression"]

[dependencies]
thiserror = { workspace = true }

[dev-dependencies]
libaec-sys = { workspace = true }
proptest = { workspace = true }

[features]
default = []
# Enable cross-validation tests against the C libaec FFI.
# Requires libaec installed at the system level.
ffi-crosscheck = []
