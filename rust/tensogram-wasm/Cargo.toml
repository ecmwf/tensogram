[package]
name = "tensogram-wasm"
version = "0.14.0"
edition = "2024"
rust-version = "1.87"
license = "Apache-2.0"
description = "WebAssembly bindings for the Tensogram N-tensor message format"
repository = "https://github.com/ecmwf/tensogram"
homepage = "https://sites.ecmwf.int/docs/tensogram/main"
documentation = "https://sites.ecmwf.int/docs/tensogram/main"
readme = "README.md"
keywords = ["tensogram", "wasm", "webassembly", "scientific-data", "tensor"]
categories = ["science", "wasm"]
authors = ["ECMWF <software-support@ecmwf.int>"]

[package.metadata.docs.rs]
default-target = "wasm32-unknown-unknown"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
tensogram-core = { path = "../tensogram-core", version = "=0.14.0", default-features = false, features = [
    "lz4",
    "szip-pure",
    "zstd-pure",
] }
ciborium = "0.2"
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.6"
serde = { version = "1", features = ["derive"] }
js-sys = "0.3"
# uuid needs the `js` feature for getrandom in WASM
uuid = { version = "1", features = ["v4", "js"] }
getrandom = { version = "0.2", features = ["js"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O3"]
