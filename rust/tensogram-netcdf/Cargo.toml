[package]
name = "tensogram-netcdf"
version = "0.13.0"
edition = "2024"
description = "NetCDF to Tensogram format converter"

[dependencies]
tensogram-core = { path = "../tensogram-core" }
tensogram-encodings = { path = "../tensogram-encodings" }
netcdf = { version = "0.12", default-features = false }
thiserror = "2"
ciborium = "0.2"

[dev-dependencies]
tempfile = "3"
