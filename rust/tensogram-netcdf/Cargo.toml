[package]
name = "tensogram-netcdf"
version = "0.17.0"
edition = "2024"
rust-version = "1.87"
license = "Apache-2.0"
description = "NetCDF to Tensogram format importer"
repository = "https://github.com/ecmwf/tensogram"
homepage = "https://sites.ecmwf.int/docs/tensogram/main"
documentation = "https://sites.ecmwf.int/docs/tensogram/main"
readme = "README.md"
keywords = ["tensogram", "netcdf", "scientific-data", "climate", "weather"]
categories = ["science"]
authors = ["ECMWF <software@ecmwf.int>"]

[dependencies]
tensogram = { path = "../tensogram", version = "=0.17.0" }
tensogram-encodings = { path = "../tensogram-encodings", version = "=0.17.0" }
netcdf = { version = "0.12", default-features = false }
thiserror = "2"
ciborium = "0.2"

[dev-dependencies]
tempfile = "3"
