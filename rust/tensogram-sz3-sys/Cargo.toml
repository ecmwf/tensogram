[package]
name = "tensogram-sz3-sys"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license-file = "LICENSES.md"
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Clean-room FFI bindings for the SZ3 lossy compression library"
documentation = "https://docs.rs/tensogram-sz3-sys"
readme = "README.md"
keywords = ["sz3", "compression", "lossy", "ffi", "scientific-data"]
categories = ["science", "compression", "external-ffi-bindings"]
links = "sz3"
include = [
    "src/**",
    "build.rs",
    "cpp/sz3_ffi.cpp",
    "SZ3/CMakeLists.txt",
    "SZ3/include/**",
    "SZ3/copyright-and-BSD-license.txt",
    "Cargo.toml",
    "README.md",
    "LICENSES.md",
]

[build-dependencies]
cc = "1"

[dependencies]
zstd-sys = "2"

[features]
default = []
openmp = []
