[package]
name = "tensogram-sz3"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "High-level SZ3 compression API for Tensogram"
documentation = "https://docs.rs/tensogram-sz3"
readme = "README.md"
keywords = ["sz3", "compression", "lossy", "scientific-data", "tensogram"]
categories = ["science", "compression"]

[dependencies]
tensogram-sz3-sys = { path = "../tensogram-sz3-sys", version = "=0.16.1" }
thiserror.workspace = true
# zstd-sys is needed to ensure the zstd symbols that tensogram-sz3-sys's C++
# code references are available at link time.
zstd-sys = "2"

[features]
default = []
openmp = ["tensogram-sz3-sys/openmp"]
