# .cargo/mutants.toml
#
# See MUTATION_TESTING.md for the rollout plan.
# See https://mutants.rs/ for cargo-mutants usage.

# Per-mutant test-time bound. tensogram's release-mode test loop runs
# in ~41s; multiplier 3.0 gives a 2-minute kill window per mutant
# before declaring timeout.
minimum_test_timeout = 30
timeout_multiplier = 3.0

# Files / paths excluded from both phases.
exclude_globs = [
    "rust/tensogram/src/remote.rs",          # I/O-driven; revisit post-Phase-2
    "rust/tensogram/src/doctor/**",          # diagnostic prints; not correctness
    "rust/tensogram-cli/**",                 # clap-driven CLI; noise
    "rust/tensogram-rust-examples/**",       # illustrative; not library code
    "rust/benchmarks/**",                    # perf only
    "rust/tensogram-sz3-sys/**",             # FFI shim; mutate tensogram-sz3
    "rust/tensogram/src/lib.rs",             # re-exports only
    "**/build.rs",                           # build scripts
]

# Per-mutation regex exemptions. Each entry MUST have a one-line
# rationale comment explaining why the mutation is equivalent or
# cosmetic. Entries are added by Phase-1 PRs as survivors are
# triaged; never mass-suppressed by category.
exclude_re = [
    # fmt_object_location is a Display-only helper for HashMismatch's #[error(…)] string;
    # no test validates the exact wording — only error type/variant matters.
    "replace fmt_object_location",

    # 1 << 0 and 1 >> 0 both evaluate to 1 — the mutation is algebraically
    # equivalent and cannot be observed by any test.  Applies to
    # MessageFlags::HEADER_METADATA (wire.rs:151) and
    # DataObjectFlags::CBOR_AFTER_PAYLOAD (wire.rs:238).
    "wire\\.rs:151:.*replace << with >>",
    "wire\\.rs:238:.*replace << with >>",

    # cbor_kind_label is a Display-only helper producing human-readable labels
    # for non-text CBOR keys in error messages.  Tests assert error variant, not
    # exact wording — deleting individual match arms just changes the label string.
    "delete match arm .* in cbor_kind_label",

    # cbor_value_kind is a Display-only helper producing human-readable labels
    # for CBOR value types in error messages (used by encode.rs param accessors).
    # Tests assert error variant, not exact wording.
    "replace cbor_value_kind",
    "delete match arm .* in cbor_value_kind",

    # ── integrity.rs: defensive bounds checks (step 1.6) ──────────────

    # inline_slot_hex (lines 35, 40): defensive bounds guards that duplicate
    # the identical checks in verify_object_frame_hash.  inline_slot_hex is
    # only called when verify_object_frame_hash already returned Verified,
    # meaning the frame was already validated in-bounds.  The conditions are
    # unreachable in practice — mutations are equivalent.
    "integrity\\.rs:35:.*in inline_slot_hex",
    "integrity\\.rs:40:.*in inline_slot_hex",

    # verify_object_frame_hash (lines 64, 75): defensive bounds guards that
    # duplicate structure validation (Level 1).  The frame offsets come from
    # FrameWalkResult which already ensures frames are within the buffer.
    # These guards only fire on structurally-invalid input that Level 1
    # would have already flagged — mutations are equivalent.
    "integrity\\.rs:64:.*in verify_object_frame_hash",
    "integrity\\.rs:75:.*in verify_object_frame_hash",

    # validate_integrity line 202: descriptor re-parse guard
    # `obj.descriptor.is_none() && !obj.descriptor_failed`.  The re-parse
    # path is only exercised in checksum_only mode (Level 2 skipped), where
    # the descriptor is parsed but never consumed (decompression is also
    # skipped).  In non-checksum mode Level 2 always runs first, so the
    # descriptor is already populated.  Both `&& → ||` and `delete !`
    # mutations are equivalent — they change when a redundant re-parse
    # occurs but never affect observable output.
    "integrity\\.rs:202:.*in validate_integrity",

    # validate_integrity line 277: decompression-check guard second `||`
    # and the `encoding !=` / `filter !=` arms.  The only encoding
    # (simple_packing) and filter (shuffle) are lossless transformations
    # whose decode never errors on corrupt input — single-byte corruption
    # produces wrong values, not pipeline errors.  Only compression codecs
    # (zstd, lz4, etc.) have internal checksums that detect corruption.
    # The `compression !=` arm and first `||` are caught by the corrupt-
    # zstd test; the remaining arms are equivalent because skipping the
    # decompression check for encoding-only or filter-only pipelines
    # produces no observable difference at integrity level.
    "integrity\\.rs:277:61:.*in validate_integrity",
    "integrity\\.rs:277:71:.*in validate_integrity",
    "integrity\\.rs:277:86:.*in validate_integrity",
]

# Run cargo test in release mode — ~8x faster per iteration on this
# codebase (release ~41s vs debug ~6 min for the tensogram crate).
additional_cargo_test_args = ["--release"]
