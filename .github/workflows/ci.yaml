name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Check docs build
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  cpp-tests:
    runs-on: ubuntu-latest
    needs: check-and-test
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ tests
        run: cmake --build build --parallel

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure

  python-tests:
    runs-on: ubuntu-latest
    needs: check-and-test
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin numpy pytest ruff

      - name: Build Python extension
        run: maturin develop --manifest-path crates/tensogram-python/Cargo.toml

      - name: Lint Python tests
        run: ruff check --config crates/tensogram-python/pyproject.toml tests/python/

      - name: Run Python tests
        run: python -m pytest tests/python/ -v

  grib-tests:
    runs-on: ubuntu-latest
    needs: check-and-test
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install ecCodes library
        run: sudo apt-get update && sudo apt-get install -y libeccodes-dev

      - name: Run GRIB tests
        run: cargo test --manifest-path crates/tensogram-grib/Cargo.toml -v
