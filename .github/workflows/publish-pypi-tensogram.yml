name: Publish tensogram to PyPI

on:
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.os }} ${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64,  manylinux: auto }
          - { os: macos-13,      target: x86_64,  manylinux: auto }
          - { os: macos-14,      target: aarch64,  manylinux: auto }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python/bindings
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
          sccache: true

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: python/bindings/dist/

  build-wheels-freethreaded:
    name: Build free-threaded wheel (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13t"

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python/bindings
          target: x86_64
          manylinux: auto
          args: --release --out dist --interpreter python3.13t
          sccache: true

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-freethreaded
          path: python/bindings/dist/

  upload:
    name: Upload to PyPI
    needs: [build-wheels, build-wheels-freethreaded]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Validate wheels
        run: |
          pip install twine
          twine check dist/*

      - name: Upload to PyPI
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
