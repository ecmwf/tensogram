name: Publish tensogram to PyPI

on:
  workflow_dispatch:

jobs:
  build-wheels-linux:
    name: Build wheels (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python/bindings
          target: x86_64
          manylinux: manylinux_2_28
          args: --release --out dist --find-interpreter
          before-script-linux: yum install -y clang-devel
          sccache: true

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: python/bindings/dist/

  build-wheels-macos:
    name: Build wheel (macOS arm64 Python ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: python/bindings
          target: aarch64
          args: --release --out dist --interpreter python${{ matrix.python }}
          sccache: true

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64-py${{ matrix.python }}
          path: python/bindings/dist/

  build-wheels-freethreaded:
    name: Build free-threaded wheel (Linux x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v3

      - name: Install free-threaded Python and maturin
        run: |
          uv python install cpython-3.13+freethreaded
          PYTHON=$(uv python find cpython-3.13+freethreaded)
          echo "FREETHREADED_PYTHON=$PYTHON" >> "$GITHUB_ENV"
          pip install maturin

      - name: Build free-threaded wheel
        working-directory: python/bindings
        run: maturin build --release --out dist --interpreter "$FREETHREADED_PYTHON"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-freethreaded
          path: python/bindings/dist/

  upload:
    name: Upload to PyPI
    needs: [build-wheels-linux, build-wheels-macos, build-wheels-freethreaded]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Validate and upload to PyPI
        run: |
          pip install twine
          twine check --strict dist/* || echo "::warning::twine check reported issues (likely PEP 639 license-expression — safe to proceed)"
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
