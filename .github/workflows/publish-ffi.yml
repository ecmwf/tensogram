name: Publish FFI release binaries

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      version:
        description: "Existing tag to attach binaries to (e.g. 0.20.0)"
        required: true
        type: string

concurrency:
  # Key the dedupe group on the resolved version, not the launching ref.
  # For tag-push, github.ref_name is the bare tag (e.g. "0.20.0").
  # For workflow_dispatch, github.ref_name is the launching branch
  # (typically "main"), so manual runs would otherwise all share a single
  # group regardless of which version they target — a manual run for
  # 0.21.0 would queue behind a manual run for 0.20.0 from the same
  # branch.  Falling back to inputs.version when present lets manual runs
  # dedupe per-version like tag-push runs do.
  group: publish-ffi-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write   # softprops/action-gh-release attaches assets to the GitHub Release

env:
  CARGO_C_VERSION: "0.10.21"

jobs:
  # Compute the checkout ref + version once so every downstream job is
  # consistent. workflow_dispatch must check out the tag (not the
  # branch the workflow was launched from), otherwise binaries would
  # be built from the wrong source.
  resolve-ref:
    name: Resolve checkout ref
    runs-on: ubuntu-24.04
    outputs:
      ref: ${{ steps.r.outputs.ref }}
      version: ${{ steps.r.outputs.version }}
    steps:
      - id: r
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  build-linux:
    name: Build ${{ matrix.label }}
    needs: resolve-ref
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runs-on: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            target: x86_64-unknown-linux-gnu
          - label: linux-aarch64
            runs-on: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install perl-core
        # cargo-c brings in `cargo` which depends on `openssl-sys`.
        # `vendored-openssl` builds OpenSSL from source, whose
        # ./Configure script and Makefile.in are perl that need
        # several stdlib modules (IPC::Cmd, Time::Piece, Pod::Html,
        # …).  manylinux_2_28's perl is stripped down to just the
        # interpreter; the AlmaLinux 8 `perl-core` metapackage pulls
        # in the complete standard library in one go, avoiding a
        # whack-a-mole of module-by-module installs.
        run: dnf install -y perl-core

      - name: Install cargo-c
        run: cargo install cargo-c --version "$CARGO_C_VERSION" --locked --features vendored-openssl

      - name: Stage install
        # The .pc file's `prefix=` is taken from --prefix and is baked into
        # the released tarball, so the on-disk layout the user extracts must
        # match. We pick /usr/local because that is the conventional UX.
        run: |
          cargo cinstall --release -p tensogram-ffi \
            --target "${{ matrix.target }}" \
            --prefix=/usr/local --libdir=lib \
            --destdir="$PWD/staging"

      - name: Smoke test
        # PKG_CONFIG_SYSROOT_DIR rewrites the .pc file's /usr/local/... paths
        # to the staged tree for the duration of the test, so the smoke test
        # uses the staged copy (not whatever may already be installed at
        # /usr/local on the runner).
        run: |
          export PKG_CONFIG_SYSROOT_DIR="$PWD/staging"
          bash cpp/tests/test_cargo_c_smoke.sh "$PWD/staging/usr/local"

      - name: Pack tarball
        run: |
          ASSET="tensogram-ffi-${{ needs.resolve-ref.outputs.version }}-${{ matrix.label }}.tar.gz"
          bash .github/scripts/pack-ffi-tarball.sh \
            "$PWD/staging" \
            "${{ needs.resolve-ref.outputs.version }}" \
            "${{ matrix.label }}" \
            "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  build-macos:
    name: Build ${{ matrix.label }}
    needs: resolve-ref
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        # macOS x86_64 is intentionally not in the matrix: the rest of
        # the project (publish-pypi.yml, ECMWF wheels) ships only
        # macOS arm64, so an x86_64 FFI tarball would be the only
        # x86_64-Mac artefact in the release without a corresponding
        # Python wheel or smoke test elsewhere.  Apple Silicon is the
        # supported macOS target.
        include:
          - label: macos-aarch64
            runs-on: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-c
        run: cargo install cargo-c --version "$CARGO_C_VERSION" --locked --features vendored-openssl

      - name: Stage install
        run: |
          cargo cinstall --release -p tensogram-ffi \
            --target "${{ matrix.target }}" \
            --prefix=/usr/local --libdir=lib \
            --destdir="$PWD/staging"

      - name: Smoke test
        run: |
          export PKG_CONFIG_SYSROOT_DIR="$PWD/staging"
          bash cpp/tests/test_cargo_c_smoke.sh "$PWD/staging/usr/local"

      - name: Pack tarball
        run: |
          ASSET="tensogram-ffi-${{ needs.resolve-ref.outputs.version }}-${{ matrix.label }}.tar.gz"
          bash .github/scripts/pack-ffi-tarball.sh \
            "$PWD/staging" \
            "${{ needs.resolve-ref.outputs.version }}" \
            "${{ matrix.label }}" \
            "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  release:
    name: Attach binaries to GitHub Release
    needs: [resolve-ref, build-linux, build-macos]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-ref.outputs.version }}
          files: artifacts/*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: false
