name: Publish FFI release binaries

on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      version:
        description: "Existing tag to attach binaries to (e.g. 0.20.0)"
        required: true
        type: string

concurrency:
  # Key the dedupe group on the resolved version, not the launching ref.
  # For tag-push, github.ref_name is the bare tag (e.g. "0.20.0").
  # For workflow_dispatch, github.ref_name is the launching branch
  # (typically "main"), so manual runs would otherwise all share a single
  # group regardless of which version they target — a manual run for
  # 0.21.0 would queue behind a manual run for 0.20.0 from the same
  # branch.  Falling back to inputs.version when present lets manual runs
  # dedupe per-version like tag-push runs do.
  group: publish-ffi-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write   # softprops/action-gh-release attaches assets to the GitHub Release

env:
  CARGO_INCREMENTAL: "0"
  TMPDIR: ${{ github.workspace }}/.tmp
  # sccache against the same ECMWF S3-compatible bucket the main CI uses.
  # Hits across publish-ffi runs and ci.yml runs whenever the FFI crate
  # graph hasn't changed.  AWS_* env var names are required by the S3
  # SDK that sccache uses internally — no actual AWS service is involved.
  RUSTC_WRAPPER: sccache
  SCCACHE_BUCKET: tensogram-ci-cache
  SCCACHE_ENDPOINT: "https://object-store.os-api.cci1.ecmwf.int"
  SCCACHE_REGION: us-east-1
  SCCACHE_S3_USE_SSL: "true"
  SCCACHE_S3_KEY_PREFIX: tensogram/
  SCCACHE_BASEDIRS: ${{ github.workspace }}
  SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
  AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

jobs:
  # Compute the checkout ref + version once so every downstream job is
  # consistent. workflow_dispatch must check out the tag (not the
  # branch the workflow was launched from), otherwise binaries would
  # be built from the wrong source.
  resolve-ref:
    name: Resolve checkout ref
    runs-on: ubuntu-24.04
    outputs:
      ref: ${{ steps.r.outputs.ref }}
      version: ${{ steps.r.outputs.version }}
    steps:
      - id: r
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  build-linux:
    name: Build linux-x86_64
    needs: resolve-ref
    # Runs inside the manylinux-based ci-ffi image (see .github/ci-ffi/
    # Dockerfile) which pre-bakes Rust, cargo-c (vendored-openssl),
    # sccache, perl-core, and clang-devel — eliminating the ~4 min
    # cargo-c install and the ~30 s dnf step that the previous workflow
    # paid on every tag push.  Self-hosted runner sits next to the
    # SCCACHE_ENDPOINT object store so cache hits are cheap.
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci-ffi:1.0.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - run: mkdir -p "$TMPDIR"

      - name: Stage install
        # The .pc file's `prefix=` is taken from --prefix and is baked into
        # the released tarball, so the on-disk layout the user extracts must
        # match. We pick /usr/local because that is the conventional UX.
        run: |
          cargo cinstall --release -p tensogram-ffi \
            --target x86_64-unknown-linux-gnu \
            --prefix=/usr/local --libdir=lib \
            --destdir="$PWD/staging"

      - name: Smoke test
        # PKG_CONFIG_SYSROOT_DIR rewrites the .pc file's /usr/local/... paths
        # to the staged tree for the duration of the test, so the smoke test
        # uses the staged copy (not whatever may already be installed at
        # /usr/local on the runner).
        run: |
          export PKG_CONFIG_SYSROOT_DIR="$PWD/staging"
          bash cpp/tests/test_cargo_c_smoke.sh "$PWD/staging/usr/local"

      - name: Pack tarball
        run: |
          ASSET="tensogram-ffi-${{ needs.resolve-ref.outputs.version }}-linux-x86_64.tar.gz"
          bash .github/scripts/pack-ffi-tarball.sh \
            "$PWD/staging" \
            "${{ needs.resolve-ref.outputs.version }}" \
            "linux-x86_64" \
            "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" target staging

  build-macos:
    name: Build macos-aarch64
    needs: resolve-ref
    # Self-hosted Apple Silicon runner — same one ci.yml's macos jobs
    # use.  Drops the macos-14 GitHub-hosted queue + brings the macOS
    # leg into the same sccache bucket as everything else.
    runs-on: [self-hosted, macOS, platform-builder-MacOSX-13.4.1-arm64]
    env:
      RUSTUP_HOME: ${{ github.workspace }}/.rustup
      CARGO_HOME: ${{ github.workspace }}/.cargo
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      CARGO_C_VERSION: "0.10.21"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - run: mkdir -p "$TMPDIR"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install sccache and pkg-config
        # pkg-config is what the smoke test below uses to discover the
        # staged tensogram.pc.  GitHub-hosted macos-14 had it pre-installed;
        # the ECMWF self-hosted Apple Silicon pool does not guarantee it,
        # so install on demand.  brew is idempotent — `brew list` returns
        # 0 if the formula is already linked.
        run: |
          brew list sccache &>/dev/null || brew install sccache
          brew list pkg-config &>/dev/null || brew install pkg-config

      - name: Install cargo-c
        run: cargo install cargo-c --version "$CARGO_C_VERSION" --locked --features vendored-openssl

      - name: Stage install
        run: |
          cargo cinstall --release -p tensogram-ffi \
            --target aarch64-apple-darwin \
            --prefix=/usr/local --libdir=lib \
            --destdir="$PWD/staging"

      - name: Smoke test
        run: |
          export PKG_CONFIG_SYSROOT_DIR="$PWD/staging"
          bash cpp/tests/test_cargo_c_smoke.sh "$PWD/staging/usr/local"

      - name: Pack tarball
        run: |
          ASSET="tensogram-ffi-${{ needs.resolve-ref.outputs.version }}-macos-aarch64.tar.gz"
          bash .github/scripts/pack-ffi-tarball.sh \
            "$PWD/staging" \
            "${{ needs.resolve-ref.outputs.version }}" \
            "macos-aarch64" \
            "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats || true

      - name: Cleanup
        if: always()
        run: |
          sccache --stop-server || true
          rm -rf "$TMPDIR" target staging .rustup .cargo .sccache

  release:
    name: Attach binaries to GitHub Release
    needs: [resolve-ref, build-linux, build-macos]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-ref.outputs.version }}
          files: artifacts/*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: false
