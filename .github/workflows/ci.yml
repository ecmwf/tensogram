name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── Main: Rust lint/test + Python bindings + GRIB + NetCDF ──────────
  main:
    name: Main (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, hpc], [self-hosted, macOS, platform-builder-MacOSX-13.4.1-arm64]]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: dpkg -s libclang-dev cmake libnetcdf-dev libhdf5-dev libeccodes-dev >/dev/null 2>&1 || (sudo apt-get update -o DPkg::Lock::Timeout=120 && sudo apt-get install -y -o DPkg::Lock::Timeout=120 libclang-dev cmake libnetcdf-dev libhdf5-dev libeccodes-dev)

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew list netcdf hdf5 eccodes >/dev/null 2>&1 || brew install netcdf hdf5 eccodes

      # ── Rust lint ──
      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (all features, core + FFI)
        run: cargo clippy -p tensogram-core -p tensogram-ffi --all-targets --all-features -- -D warnings

      - name: Clippy (NetCDF)
        run: cargo clippy --manifest-path crates/tensogram-netcdf/Cargo.toml --all-targets -- -D warnings

      # ── Rust test ──
      - name: Test
        run: cargo test --workspace

      - name: Test (remote feature)
        run: cargo test -p tensogram-core --features remote

      - name: Test (remote + async features)
        run: cargo test -p tensogram-core --features "remote,async"

      - name: Test (GRIB)
        run: |
          cargo test -p tensogram-grib
          cargo test -p tensogram-cli --features grib

      - name: Test (NetCDF)
        run: |
          cargo clippy -p tensogram-netcdf --all-targets -- -D warnings
          cargo test -p tensogram-netcdf
          cargo test -p tensogram-cli --features netcdf

      # ── Python bindings (reuses compiled workspace) ──
      - name: Build and test Python bindings
        run: |
          uv python install 3.13
          uv venv .venv --python 3.13
          source .venv/bin/activate
          uv pip install maturin pytest numpy ruff
          cd crates/tensogram-python && maturin develop && cd ../..
          ruff check --config crates/tensogram-python/pyproject.toml tests/python/
          python -m pytest tests/python/ -v

  # ── Python: free-threaded 3.13t ───────────────────────────────────────
  python-free-threaded:
    name: Python 3.13t (free-threaded)
    needs: main
    runs-on: [self-hosted, Linux, hpc]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: dpkg -s libclang-dev cmake >/dev/null 2>&1 || (sudo apt-get update -o DPkg::Lock::Timeout=120 && sudo apt-get install -y -o DPkg::Lock::Timeout=120 libclang-dev cmake)

      - name: Build and test
        env:
          PYTHON_GIL: "0"
        run: |
          uv python install cpython-3.13+freethreaded
          uv venv .venv --python python3.13t
          source .venv/bin/activate
          uv pip install maturin pytest "numpy>=2.1"
          python -c "import sys; assert not sys._is_gil_enabled(), 'GIL should be disabled'"
          cd crates/tensogram-python && maturin develop --release && cd ../..
          python -m pytest tests/python/ -v

  # ── Python packages: xarray + zarr ───────────────────────────────────
  python-packages:
    name: Python packages
    needs: main
    runs-on: [self-hosted, Linux, hpc]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: dpkg -s libclang-dev cmake >/dev/null 2>&1 || (sudo apt-get update -o DPkg::Lock::Timeout=120 && sudo apt-get install -y -o DPkg::Lock::Timeout=120 libclang-dev cmake)

      - name: Build and test
        run: |
          uv python install 3.12
          uv venv .venv --python 3.12
          source .venv/bin/activate
          uv pip install maturin pytest numpy
          cd crates/tensogram-python && maturin develop && cd ../..
          uv pip install -e "tensogram-xarray/[dask]"
          python -m pytest tensogram-xarray/tests/ -v
          uv pip install -e tensogram-zarr/
          python -m pytest tensogram-zarr/tests/ -v

  # ── C++: build + test ────────────────────────────────────────────────
  cpp:
    name: C++ (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, hpc], [self-hosted, macOS, platform-builder-MacOSX-13.4.1-arm64]]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: dpkg -s libclang-dev cmake >/dev/null 2>&1 || (sudo apt-get update -o DPkg::Lock::Timeout=120 && sudo apt-get install -y -o DPkg::Lock::Timeout=120 libclang-dev cmake)

      - name: Build and test
        run: |
          cargo build --release
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
          ctest --test-dir build --output-on-failure

  # ── Documentation: mdbook ────────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: [self-hosted, Linux, hpc]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: |
          which mdbook >/dev/null 2>&1 || cargo install mdbook --locked
          which mdbook-mermaid >/dev/null 2>&1 || cargo install mdbook-mermaid --locked
          cd docs && mdbook build

  # ── WASM: build + test ───────────────────────────────────────────────
  wasm:
    name: WASM
    runs-on: [self-hosted, Linux, hpc]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build and test
        run: |
          which wasm-pack >/dev/null 2>&1 || cargo install wasm-pack --locked
          wasm-pack test --node crates/tensogram-wasm
