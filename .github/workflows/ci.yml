name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust: build, lint, test ──────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  # ── Python: build bindings + test ────────────────────────────────────
  python:
    name: Python (${{ matrix.os }}, ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Python dependencies
        run: pip install maturin pytest numpy ruff

      - name: Build Python bindings
        working-directory: crates/tensogram-python
        run: maturin develop

      - name: Lint
        run: ruff check --config crates/tensogram-python/pyproject.toml tests/python/

      - name: Test
        run: python -m pytest tests/python/ -v

  # ── Python packages: xarray + zarr ───────────────────────────────────
  python-packages:
    name: Python packages (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install base
        run: |
          pip install maturin pytest numpy
          cd crates/tensogram-python && maturin develop && cd ../..

      - name: Install xarray package
        run: pip install -e "tensogram-xarray/[dask]"

      - name: Test xarray
        run: python -m pytest tensogram-xarray/tests/ -v

      - name: Install zarr package
        run: pip install -e tensogram-zarr/

      - name: Test zarr
        run: python -m pytest tensogram-zarr/tests/ -v

  # ── C++: build + test ────────────────────────────────────────────────
  cpp:
    name: C++ (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Rust libraries
        run: cargo build --release

      - name: CMake configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: CMake build
        run: cmake --build build -j

      - name: CTest
        run: ctest --test-dir build --output-on-failure

  # ── Documentation: mdbook ────────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook
        run: cargo install mdbook --locked
      - name: Build docs
        working-directory: docs
        run: mdbook build
