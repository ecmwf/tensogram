name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  TMPDIR: ${{ github.workspace }}/.tmp
  NODE_VERSION: "22.22.2"

jobs:
  # ── Linux: lint + test + GRIB + NetCDF + Python ────────────────
  main-linux:
    name: Main (Linux)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.0.0
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"
      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: |
          cargo clippy --workspace --all-targets -- -D warnings
          cargo clippy -p tensogram-core -p tensogram-ffi -p tensogram-cli --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Test (remote feature)
        run: cargo test -p tensogram-core --features remote

      - name: Test (remote + async features)
        run: cargo test -p tensogram-core --features "remote,async"

      - name: Test (GRIB)
        run: |
          cargo test --manifest-path crates/tensogram-grib/Cargo.toml
          cargo test -p tensogram-cli --features grib

      - name: Test (NetCDF)
        run: |
          cargo clippy --manifest-path crates/tensogram-netcdf/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path crates/tensogram-netcdf/Cargo.toml
          cargo test -p tensogram-cli --features netcdf

      - name: Build and test Python bindings
        run: |
          uv python install 3.13
          uv venv .venv --python 3.13
          source .venv/bin/activate
          uv pip install maturin pytest pytest-asyncio numpy ruff
          cd crates/tensogram-python && maturin develop && cd ../..
          ruff check --config crates/tensogram-python/pyproject.toml tests/python/
          python -m pytest tests/python/ -v
          cargo check --manifest-path crates/tensogram-python/Cargo.toml --no-default-features

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" .venv target build

  # ── macOS: lint + test + GRIB + NetCDF + Python ────────────────
  main-macos:
    name: Main (macOS)
    runs-on: [self-hosted, macOS, platform-builder-MacOSX-13.4.1-arm64]
    env:
      RUSTUP_HOME: ${{ github.workspace }}/.rustup
      CARGO_HOME: ${{ github.workspace }}/.cargo
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          for pkg in netcdf hdf5 eccodes; do
            brew list --formula "$pkg" >/dev/null 2>&1 || brew install "$pkg"
          done
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix eccodes)/lib/pkgconfig:$(brew --prefix netcdf)/lib/pkgconfig:$(brew --prefix hdf5)/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "ECCODES_DIR=$(brew --prefix eccodes)" >> "$GITHUB_ENV"

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: |
          cargo clippy --workspace --all-targets -- -D warnings
          cargo clippy -p tensogram-core -p tensogram-ffi -p tensogram-cli --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Test (remote feature)
        run: cargo test -p tensogram-core --features remote

      - name: Test (remote + async features)
        run: cargo test -p tensogram-core --features "remote,async"

      - name: Test (GRIB)
        run: |
          cargo test --manifest-path crates/tensogram-grib/Cargo.toml
          cargo test -p tensogram-cli --features grib

      - name: Test (NetCDF)
        run: |
          cargo clippy --manifest-path crates/tensogram-netcdf/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path crates/tensogram-netcdf/Cargo.toml
          cargo test -p tensogram-cli --features netcdf

      - name: Build and test Python bindings
        run: |
          uv python install 3.13
          uv venv .venv --python 3.13
          source .venv/bin/activate
          uv pip install maturin pytest pytest-asyncio numpy ruff
          cd crates/tensogram-python && maturin develop && cd ../..
          ruff check --config crates/tensogram-python/pyproject.toml tests/python/
          python -m pytest tests/python/ -v
          cargo check --manifest-path crates/tensogram-python/Cargo.toml --no-default-features

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" .venv build .rustup .cargo .llvm target

  # ── Python: free-threaded 3.13t ────────────────────────────────
  python-free-threaded:
    name: Python 3.13t (free-threaded)
    needs: main-linux
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.0.0
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"


      - name: Build and test
        env:
          PYTHON_GIL: "0"
        run: |
          uv python install cpython-3.13+freethreaded
          uv venv .venv --python python3.13t
          source .venv/bin/activate
          uv pip install maturin pytest pytest-asyncio "numpy>=2.1"
          python -c "import sys; assert not sys._is_gil_enabled(), 'GIL should be disabled'"
          cd crates/tensogram-python && maturin develop --release && cd ../..
          python -m pytest tests/python/ -v

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" .venv target

  # ── Python packages: xarray + zarr ─────────────────────────────
  python-packages:
    name: Python packages
    needs: main-linux
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.0.0
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"


      - name: Build and test
        run: |
          uv python install 3.12
          uv venv .venv --python 3.12
          source .venv/bin/activate
          uv pip install maturin pytest numpy
          cd crates/tensogram-python && maturin develop && cd ../..
          uv pip install -e "tensogram-xarray/[dask]"
          python -m pytest tensogram-xarray/tests/ -v
          uv pip install -e tensogram-zarr/
          python -m pytest tensogram-zarr/tests/ -v

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" .venv target

  # ── C++: Linux ─────────────────────────────────────────────────
  cpp-linux:
    name: C++ (Linux)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.0.0
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"


      - name: Build and test
        run: |
          cargo build --release -p tensogram-ffi
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
          ctest --test-dir build --output-on-failure

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" build target

  # ── C++: macOS ─────────────────────────────────────────────────
  cpp-macos:
    name: C++ (macOS)
    runs-on: [self-hosted, macOS, platform-builder-MacOSX-13.4.1-arm64]
    env:
      RUSTUP_HOME: ${{ github.workspace }}/.rustup
      CARGO_HOME: ${{ github.workspace }}/.cargo
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"
      - uses: dtolnay/rust-toolchain@stable


      - name: Build and test
        run: |
          cargo build --release -p tensogram-ffi
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
          ctest --test-dir build --output-on-failure

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" build .rustup .cargo target

  # ── WASM: build + test ────────────────────────────────────────
  wasm:
    name: WASM
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.0.0
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"


      - name: Install Node.js
        run: |
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.gz" \
            | tar xz --strip-components=1 -C /usr/local "node-v${NODE_VERSION}-linux-x64/bin/node"

      - name: Build and test
        run: wasm-pack test --node crates/tensogram-wasm

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" target
