name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0


jobs:
  # ── Main: Rust lint/test + Python bindings + GRIB + NetCDF ──────────
  main:
    name: Main (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, platform-builder-docker-xl], [self-hosted, macOS, platform-builder-MacOSX-13.4.1-arm64]]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          dpkg -s libclang-dev libnetcdf-dev libhdf5-dev libeccodes-dev >/dev/null 2>&1 || (sudo apt-get update -o DPkg::Lock::Timeout=120 && sudo apt-get install -y -o DPkg::Lock::Timeout=120 libclang-dev libnetcdf-dev libhdf5-dev libeccodes-dev)
          which cmake >/dev/null 2>&1 && cmake --version | grep -q "3\.\(2[6-9]\|[3-9][0-9]\)" || (pip install cmake && echo "$HOME/.local/bin" >> "$GITHUB_PATH")

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          for pkg in netcdf hdf5 eccodes; do
            brew list --formula "$pkg" >/dev/null 2>&1 || brew install "$pkg"
          done
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix eccodes)/lib/pkgconfig:$(brew --prefix netcdf)/lib/pkgconfig:$(brew --prefix hdf5)/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "ECCODES_DIR=$(brew --prefix eccodes)" >> "$GITHUB_ENV"

      # ── Rust lint ──
      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: |
          cargo clippy --workspace --all-targets -- -D warnings
          cargo clippy -p tensogram-core -p tensogram-ffi --all-targets --all-features -- -D warnings

      # ── Rust test ──
      - name: Test
        run: cargo test --workspace

      - name: Test (remote feature)
        run: cargo test -p tensogram-core --features remote

      - name: Test (remote + async features)
        run: cargo test -p tensogram-core --features "remote,async"

      - name: Test (GRIB)
        run: |
          cargo test --manifest-path crates/tensogram-grib/Cargo.toml
          cargo test -p tensogram-cli --features grib

      - name: Test (NetCDF)
        run: |
          cargo clippy --manifest-path crates/tensogram-netcdf/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path crates/tensogram-netcdf/Cargo.toml
          cargo test -p tensogram-cli --features netcdf

      # ── Python bindings (reuses compiled workspace) ──
      - name: Build and test Python bindings
        run: |
          uv python install 3.13
          uv venv .venv --python 3.13
          source .venv/bin/activate
          uv pip install maturin pytest numpy ruff
          cd crates/tensogram-python && maturin develop && cd ../..
          ruff check --config crates/tensogram-python/pyproject.toml tests/python/
          python -m pytest tests/python/ -v

  # ── Python: free-threaded 3.13t ───────────────────────────────────────
  python-free-threaded:
    name: Python 3.13t (free-threaded)
    needs: main
    runs-on: [self-hosted, Linux, platform-builder-docker-xl]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          dpkg -s libclang-dev >/dev/null 2>&1 || (sudo apt-get update -o DPkg::Lock::Timeout=120 && sudo apt-get install -y -o DPkg::Lock::Timeout=120 libclang-dev)
          which cmake >/dev/null 2>&1 && cmake --version | grep -q "3\.\(2[6-9]\|[3-9][0-9]\)" || (pip install cmake && echo "$HOME/.local/bin" >> "$GITHUB_PATH")

      - name: Build and test
        env:
          PYTHON_GIL: "0"
        run: |
          uv python install cpython-3.13+freethreaded
          uv venv .venv --python python3.13t
          source .venv/bin/activate
          uv pip install maturin pytest "numpy>=2.1"
          python -c "import sys; assert not sys._is_gil_enabled(), 'GIL should be disabled'"
          cd crates/tensogram-python && maturin develop --release && cd ../..
          python -m pytest tests/python/ -v

  # ── Python packages: xarray + zarr ───────────────────────────────────
  python-packages:
    name: Python packages
    needs: main
    runs-on: [self-hosted, Linux, platform-builder-docker-xl]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          dpkg -s libclang-dev >/dev/null 2>&1 || (sudo apt-get update -o DPkg::Lock::Timeout=120 && sudo apt-get install -y -o DPkg::Lock::Timeout=120 libclang-dev)
          which cmake >/dev/null 2>&1 && cmake --version | grep -q "3\.\(2[6-9]\|[3-9][0-9]\)" || (pip install cmake && echo "$HOME/.local/bin" >> "$GITHUB_PATH")

      - name: Build and test
        run: |
          uv python install 3.12
          uv venv .venv --python 3.12
          source .venv/bin/activate
          uv pip install maturin pytest numpy
          cd crates/tensogram-python && maturin develop && cd ../..
          uv pip install -e "tensogram-xarray/[dask]"
          python -m pytest tensogram-xarray/tests/ -v
          uv pip install -e tensogram-zarr/
          python -m pytest tensogram-zarr/tests/ -v

  # ── C++: build + test ────────────────────────────────────────────────
  cpp:
    name: C++ (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, platform-builder-docker-xl], [self-hosted, macOS, platform-builder-MacOSX-13.4.1-arm64]]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          dpkg -s libclang-dev >/dev/null 2>&1 || (sudo apt-get update -o DPkg::Lock::Timeout=120 && sudo apt-get install -y -o DPkg::Lock::Timeout=120 libclang-dev)
          which cmake >/dev/null 2>&1 && cmake --version | grep -q "3\.\(2[6-9]\|[3-9][0-9]\)" || (pip install cmake && echo "$HOME/.local/bin" >> "$GITHUB_PATH")
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build and test
        run: |
          cargo build --release -p tensogram-ffi
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
          ctest --test-dir build --output-on-failure

  # ── WASM: build + test ───────────────────────────────────────────────
  wasm:
    name: WASM
    runs-on: [self-hosted, Linux, platform-builder-docker-xl]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build and test
        run: |
          which wasm-pack >/dev/null 2>&1 || cargo install wasm-pack --locked
          wasm-pack test --node crates/tensogram-wasm
