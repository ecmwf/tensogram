name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust: build, lint, test ──────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      # Skip --all-features to avoid tensogram-grib which requires ecCodes.
      # The workspace excludes tensogram-python and tensogram-grib by default.
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  # ── Python: build bindings + test ────────────────────────────────────
  python:
    name: Python (${{ matrix.os }}, ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create virtualenv and install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install maturin pytest numpy ruff

      - name: Build Python bindings
        run: |
          source .venv/bin/activate
          cd crates/tensogram-python && maturin develop

      - name: Lint
        run: |
          source .venv/bin/activate
          ruff check --config crates/tensogram-python/pyproject.toml tests/python/

      - name: Test
        run: |
          source .venv/bin/activate
          python -m pytest tests/python/ -v

  # ── Python packages: xarray + zarr ───────────────────────────────────
  python-packages:
    name: Python packages
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create virtualenv and install base
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install maturin pytest numpy
          cd crates/tensogram-python && maturin develop && cd ../.. 

      - name: Install and test xarray
        run: |
          source .venv/bin/activate
          uv pip install -e "tensogram-xarray/[dask]"
          python -m pytest tensogram-xarray/tests/ -v

      - name: Install and test zarr
        run: |
          source .venv/bin/activate
          uv pip install -e tensogram-zarr/
          python -m pytest tensogram-zarr/tests/ -v

  # ── GRIB: build + test (requires ecCodes) ─────────────────────────────
  grib:
    name: GRIB
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install ecCodes library
        run: sudo apt-get update && sudo apt-get install -y libeccodes-dev

      - name: Run GRIB tests
        run: cargo test --manifest-path crates/tensogram-grib/Cargo.toml -v

  # ── C++: build + test ────────────────────────────────────────────────
  cpp:
    name: C++ (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Rust libraries
        run: cargo build --release

      - name: CMake configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: CMake build
        run: cmake --build build -j

      - name: CTest
        run: ctest --test-dir build --output-on-failure

  # ── Documentation: mdbook ────────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook + preprocessors
        run: |
          cargo install mdbook --locked
          cargo install mdbook-mermaid --locked
      - name: Build docs
        working-directory: docs
        run: mdbook build
