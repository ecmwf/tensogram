name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust: build, lint, test ──────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, hpc], [self-hosted, macOS, platform-builder-MacOSX-13.4.1-arm64]]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      # Skip --all-features on workspace level to avoid tensogram-grib (requires ecCodes).
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (all features, core + FFI)
        run: cargo clippy -p tensogram-core -p tensogram-ffi --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Test (remote feature)
        run: cargo test -p tensogram-core --features remote

      - name: Test (remote + async features)
        run: cargo test -p tensogram-core --features "remote,async"

  # ── Python: build bindings + test ────────────────────────────────────
  python:
    name: Python (${{ matrix.runner }}, ${{ matrix.python }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, hpc], [self-hosted, macOS, platform-builder-MacOSX-13.4.1-arm64]]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # libnetcdf is needed so the feature-gated tensogram-cli build
      # for the convert-netcdf end-to-end tests succeeds.
      - name: Install libnetcdf (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libnetcdf-dev libhdf5-dev

      - name: Install libnetcdf (macOS)
        if: runner.os == 'macOS'
        run: brew install netcdf hdf5

      - name: Create virtualenv and install dependencies
        run: |
          uv python install ${{ matrix.python }}
          uv venv .venv --python ${{ matrix.python }}
          source .venv/bin/activate
          uv pip install maturin pytest numpy ruff netCDF4

      - name: Build Python bindings
        run: |
          source .venv/bin/activate
          cd crates/tensogram-python && maturin develop

      - name: Build tensogram CLI with netcdf feature
        run: cargo build -p tensogram-cli --features netcdf

      - name: Lint
        run: |
          source .venv/bin/activate
          ruff check --config crates/tensogram-python/pyproject.toml tests/python/

      - name: Test
        run: |
          source .venv/bin/activate
          python -m pytest tests/python/ -v

  # ── Python: free-threaded 3.13t ───────────────────────────────────────
  python-free-threaded:
    name: Python 3.13t (free-threaded)
    runs-on: [self-hosted, Linux, hpc]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install free-threaded Python and create virtualenv
        run: |
          uv python install cpython-3.13+freethreaded
          uv venv .venv --python python3.13t
          source .venv/bin/activate
          uv pip install maturin pytest "numpy>=2.1"

      - name: Verify GIL is disabled
        env:
          PYTHON_GIL: "0"
        run: |
          source .venv/bin/activate
          python -c "import sys; assert not sys._is_gil_enabled(), 'GIL should be disabled'"

      - name: Build Python bindings
        run: |
          source .venv/bin/activate
          cd crates/tensogram-python && maturin develop --release

      - name: Test
        env:
          PYTHON_GIL: "0"
        run: |
          source .venv/bin/activate
          python -m pytest tests/python/ -v

  # ── Python packages: xarray + zarr ───────────────────────────────────
  python-packages:
    name: Python packages
    runs-on: [self-hosted, Linux, hpc]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create virtualenv and install base
        run: |
          uv python install 3.12
          uv venv .venv --python 3.12
          source .venv/bin/activate
          uv pip install maturin pytest numpy
          cd crates/tensogram-python && maturin develop && cd ../..

      - name: Install and test xarray
        run: |
          source .venv/bin/activate
          uv pip install -e "tensogram-xarray/[dask]"
          python -m pytest tensogram-xarray/tests/ -v

      - name: Install and test zarr
        run: |
          source .venv/bin/activate
          uv pip install -e tensogram-zarr/
          python -m pytest tensogram-zarr/tests/ -v

  # ── GRIB: build + test (requires ecCodes) ─────────────────────────────
  grib:
    name: GRIB (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, hpc], [self-hosted, macOS, platform-builder-MacOSX-13.4.1-arm64]]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install ecCodes library (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libeccodes-dev

      - name: Install ecCodes library (macOS)
        if: runner.os == 'macOS'
        run: brew install eccodes

      - name: Run GRIB tests
        run: cargo test --manifest-path crates/tensogram-grib/Cargo.toml -v

      - name: Run CLI tests with grib feature
        run: cargo test -p tensogram-cli --features grib -v

  # ── NetCDF: build + test (requires libnetcdf) ─────────────────────────
  netcdf:
    name: NetCDF (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, hpc], [self-hosted, macOS, platform-builder-MacOSX-13.4.1-arm64]]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install libnetcdf (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libnetcdf-dev libhdf5-dev

      - name: Install libnetcdf (macOS)
        if: runner.os == 'macOS'
        run: brew install netcdf hdf5

      - name: Clippy NetCDF crate
        run: cargo clippy --manifest-path crates/tensogram-netcdf/Cargo.toml --all-targets -- -D warnings

      - name: Run NetCDF library tests
        run: cargo test --manifest-path crates/tensogram-netcdf/Cargo.toml -v

      - name: Run CLI tests with netcdf feature
        run: cargo test -p tensogram-cli --features netcdf -v

      - name: Build convert-netcdf rust example
        run: cargo build -p tensogram-rust-examples --bin 12_convert_netcdf --features netcdf

  # ── C++: build + test ────────────────────────────────────────────────
  cpp:
    name: C++ (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [[self-hosted, Linux, hpc], [self-hosted, macOS, platform-builder-MacOSX-13.4.1-arm64]]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Rust libraries
        run: cargo build --release

      - name: CMake configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: CMake build
        run: cmake --build build -j

      - name: CTest
        run: ctest --test-dir build --output-on-failure

  # ── Documentation: mdbook ────────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: [self-hosted, Linux, hpc]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install mdbook + preprocessors
        run: |
          cargo install mdbook --locked
          cargo install mdbook-mermaid --locked
      - name: Build docs
        working-directory: docs
        run: mdbook build

  # ── WASM: build + test ───────────────────────────────────────────────
  wasm:
    name: WASM
    runs-on: [self-hosted, Linux, hpc]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
      - name: Test WASM (Node.js)
        run: wasm-pack test --node crates/tensogram-wasm
