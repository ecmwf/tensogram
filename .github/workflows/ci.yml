name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  TMPDIR: ${{ github.workspace }}/.tmp
  # sccache with S3-compatible backend (ECMWF object store).
  # AWS_* env var names are required by the S3 SDK that sccache uses
  # internally — no actual AWS service is involved.
  RUSTC_WRAPPER: sccache
  SCCACHE_BUCKET: tensogram-ci-cache
  SCCACHE_ENDPOINT: "https://object-store.os-api.cci1.ecmwf.int"
  SCCACHE_REGION: us-east-1
  SCCACHE_S3_USE_SSL: "true"
  SCCACHE_S3_KEY_PREFIX: tensogram/
  SCCACHE_BASEDIRS: ${{ github.workspace }}
  SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
  AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

jobs:
  # ── Linux: lint ────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      - name: Format + Clippy
        run: make rust-lint

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Cargo audit (advisory database scan)
        run: cargo audit

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" target

  # ── Linux: Rust tests ──────────────────────────────────────────
  test-rust:
    name: Test (Rust)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      - name: Test
        run: |
          cargo test --workspace
          cargo test -p tensogram --features remote
          cargo test -p tensogram --features "remote,async"
          # The FFI's async tests file is `cfg(feature = "async")`, so
          # `cargo test --workspace` (default features) compiles it to
          # nothing.  Add an explicit pass with the async features so
          # the dispatcher pool, streaming-encoder, and null-arg
          # validation tests actually run in CI.
          cargo test -p tensogram-ffi --features "async,async-remote"

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" target

  # ── Linux: Python 3.13 bindings ────────────────────────────────
  test-python:
    name: Test (Python 3.13)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      - name: Python bindings (3.13)
        run: |
          uv python install 3.13
          uv venv .venv --python 3.13
          . .venv/bin/activate
          uv pip install maturin pytest pytest-asyncio numpy ruff
          cd python/bindings && maturin develop && cd ../..
          ruff check --config python/bindings/pyproject.toml python/tests/
          python -m pytest python/tests/ -v
          cargo check --manifest-path python/bindings/Cargo.toml --no-default-features

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" .venv target

  # ── Linux: xarray + zarr (Python 3.12) ─────────────────────────
  test-python-packages:
    name: Test (xarray + zarr)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      - name: Python packages (3.12, xarray + zarr)
        run: |
          uv python install 3.12
          uv venv .venv --python 3.12
          . .venv/bin/activate
          uv pip install maturin pytest numpy
          cd python/bindings && maturin develop && cd ../..
          uv pip install -e "python/tensogram-xarray/[dask]"
          python -m pytest python/tensogram-xarray/tests/ -v
          uv pip install -e python/tensogram-zarr/
          python -m pytest python/tensogram-zarr/tests/ -v

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" .venv target

  # ── Linux: runnable docs examples ──────────────────────────────
  # mdbook code blocks are NOT exercised by `cargo test` (only `///` doctests
  # are), so a documented example can silently rot. This runs the
  # self-contained ones (Rust `fn main()` + Python with their own imports).
  doc-examples:
    name: Doc examples
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      - name: Run runnable docs examples (Rust + Python)
        run: |
          uv python install 3.13
          uv venv .venv --python 3.13
          . .venv/bin/activate
          uv pip install maturin numpy
          cd python/bindings && maturin develop && cd ../..
          # Optional deps used by some doc examples (xarray / zarr / dask);
          # blocks needing an absent optional dep are skipped, not failed.
          uv pip install -e "python/tensogram-xarray/[dask]"
          uv pip install -e python/tensogram-zarr/
          python scripts/test_doc_examples.py

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" .venv target

  # ── Linux: earthkit-data integration ───────────────────────────
  test-earthkit:
    name: Test (earthkit-data integration)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      - name: tensogram-earthkit (3.12)
        run: |
          uv python install 3.12
          uv venv .venv --python 3.12
          . .venv/bin/activate
          uv pip install maturin pytest numpy ruff "earthkit-data>=1.0.2,<2" earthkit-utils
          cd python/bindings && maturin develop && cd ../..
          uv pip install -e python/tensogram-xarray/
          uv pip install -e "python/tensogram-earthkit/[dev]"
          ruff check python/tensogram-earthkit/
          ruff format --check python/tensogram-earthkit/
          python -m pytest python/tensogram-earthkit/tests/ -v

      - name: Smoke-test example
        run: |
          . .venv/bin/activate
          python examples/python/18_earthkit_integration.py

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" .venv target

  # ── Linux: Jupyter notebooks (executes examples/jupyter/*.ipynb end-to-end) ──
  notebooks:
    name: Test (Jupyter notebooks)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      # The CI image does not carry libeccodes / libnetcdf — installing
      # them here keeps the image lean (they are only needed for this
      # one job + the Jupyter notebooks on a user's machine).
      - name: Install libeccodes + libnetcdf + libhdf5
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libeccodes-dev libnetcdf-dev libhdf5-dev
          apt-get clean && rm -rf /var/lib/apt/lists/*

      - name: Build bindings (with grib + netcdf features) and install notebook deps
        run: |
          uv python install 3.13
          uv venv .venv --python 3.13
          . .venv/bin/activate
          uv pip install maturin numpy pytest nbformat
          # Build the Python bindings with GRIB and NetCDF support.
          cd python/bindings && maturin develop --features grib,netcdf && cd ../..
          # Install xarray backend + notebook deps (editable).
          uv pip install -e python/tensogram-xarray/
          uv pip install -e "examples/jupyter[dev]"

      - name: Structural guard (fast; fails if someone forgot nbstripout)
        run: |
          . .venv/bin/activate
          python -m pytest python/tests/test_jupyter_structure.py -v

      - name: Execute every notebook end-to-end (nbval-lax)
        run: |
          . .venv/bin/activate
          python -m pytest --nbval-lax examples/jupyter/ -v

      - name: Run the rewritten / new examples as smoke tests
        run: |
          . .venv/bin/activate
          python examples/python/12_convert_netcdf.py
          python examples/python/17_convert_grib.py

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" .venv target

  # ── Linux: free-threaded Python 3.13t ──────────────────────────
  test-python-ft:
    name: Test (Python 3.13t free-threaded)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      - name: Python free-threaded (3.13t)
        env:
          PYTHON_GIL: "0"
        run: |
          uv python install cpython-3.13+freethreaded
          uv venv .venv --python python3.13t
          . .venv/bin/activate
          uv pip install maturin pytest pytest-asyncio "numpy>=2.1"
          python -c "import sys; assert not sys._is_gil_enabled(), 'GIL should be disabled'"
          cd python/bindings && maturin develop --release && cd ../..
          python -m pytest python/tests/ -v

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" .venv target

  # ── macOS: lint + test + GRIB + NetCDF + Python ────────────────
  main-macos:
    name: Main (macOS)
    # GitHub-hosted arm64 macOS — the self-hosted runner is offline (the org
    # pays for these minutes). sccache is disabled (RUSTC_WRAPPER="") because
    # its backend is the ECMWF-internal object store, unreachable from
    # GitHub-hosted runners.
    runs-on: macos-14
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          for pkg in netcdf hdf5 eccodes; do
            brew list --formula "$pkg" >/dev/null 2>&1 || brew install "$pkg"
          done
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix eccodes)/lib/pkgconfig:$(brew --prefix netcdf)/lib/pkgconfig:$(brew --prefix hdf5)/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "ECCODES_DIR=$(brew --prefix eccodes)" >> "$GITHUB_ENV"

      - name: Format check
        run: make rust-fmt

      - name: Clippy
        run: |
          cargo clippy --workspace --all-targets -- -D warnings
          cargo clippy -p tensogram --all-targets --features "remote,async" -- -D warnings
          cargo clippy -p tensogram-cli --all-targets --features "grib,netcdf" -- -D warnings
          cargo clippy --manifest-path rust/tensogram-netcdf/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Test (remote feature)
        run: cargo test -p tensogram --features remote

      - name: Test (remote + async features)
        run: cargo test -p tensogram --features "remote,async"

      - name: Test (FFI async)
        # FFI's async tests file is `cfg(feature = "async")`; default
        # `cargo test --workspace` compiles it to nothing.
        run: cargo test -p tensogram-ffi --features "async,async-remote"

      - name: Test (GRIB)
        run: |
          cargo test --manifest-path rust/tensogram-grib/Cargo.toml
          cargo test -p tensogram-cli --features grib

      - name: Test (NetCDF)
        run: |
          cargo clippy --manifest-path rust/tensogram-netcdf/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path rust/tensogram-netcdf/Cargo.toml
          cargo test -p tensogram-cli --features netcdf

      - name: Build and test Python bindings
        run: |
          uv python install 3.13
          uv venv .venv --python 3.13
          . .venv/bin/activate
          uv pip install maturin pytest pytest-asyncio numpy ruff
          cd python/bindings && maturin develop && cd ../..
          ruff check --config python/bindings/pyproject.toml python/tests/
          python -m pytest python/tests/ -v
          cargo check --manifest-path python/bindings/Cargo.toml --no-default-features

      - name: Test earthkit-data integration (macOS)
        run: |
          . .venv/bin/activate
          uv pip install "earthkit-data>=1.0.2,<2" earthkit-utils
          uv pip install -e python/tensogram-xarray/
          uv pip install -e "python/tensogram-earthkit/[dev]"
          ruff check python/tensogram-earthkit/
          ruff format --check python/tensogram-earthkit/
          python -m pytest python/tensogram-earthkit/tests/ -v


  # ── C++: Linux ─────────────────────────────────────────────────
  cpp-linux:
    name: C++ (Linux)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      - name: Build and test
        run: |
          cargo build --release -p tensogram-ffi
          cmake -S cpp -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          cmake --build build -j
          ctest --test-dir build --output-on-failure

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" build target

  # ── cargo-c: build + install + smoke test the C API distribution ─
  cargo-c:
    name: cargo-c (C API)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    env:
      CARGO_C_VERSION: "0.10.21"
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      - name: Install cargo-c
        # vendored-openssl: the ECMWF CI image does not ship libssl-dev,
        # so cargo-c's transitive openssl-sys dependency cannot find a
        # system OpenSSL. Vendoring is the upstream-recommended escape.
        run: cargo install cargo-c --version "$CARGO_C_VERSION" --locked --features vendored-openssl

      - name: Build C API artifacts
        run: cargo cbuild --release -p tensogram-ffi

      - name: Verify build outputs
        run: |
          BASE=target/x86_64-unknown-linux-gnu/release
          for f in libtensogram.so libtensogram.a tensogram.pc include/tensogram/tensogram.h; do
            test -e "$BASE/$f" || { echo "::error::missing $BASE/$f"; exit 1; }
          done

      - name: Header drift check
        # Both invocations must consume the same cbindgen.toml and emit a
        # byte-identical header. Any drift means cargo-c metadata or
        # cbindgen.toml is out of sync.
        run: |
          diff -u rust/tensogram-ffi/tensogram.h \
                  target/x86_64-unknown-linux-gnu/release/include/tensogram/tensogram.h

      - name: Install and smoke test
        # --libdir=lib pinned because the ECMWF Debian-based CI image
        # would otherwise pick a multiarch libdir (lib/x86_64-linux-gnu),
        # putting tensogram.pc somewhere the smoke script does not look.
        run: |
          PFX="$(mktemp -d)"
          cargo cinstall --release -p tensogram-ffi --prefix="$PFX" --libdir=lib
          bash cpp/tests/test_cargo_c_smoke.sh "$PFX"

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" target

  # ── Fortran: binding build + tests (incl. cross-language parity) ─
  # Links the cargo-c-installed C ABI via pkg-config (matching the user
  # flow). CMake is the system of record; CTest runs the round-trip,
  # dtype/rank, file API, metadata, error, copy-guard, the error-enum
  # consistency check, and the bidirectional Fortran<->C/C++ AND
  # Fortran<->Python parity tests. The library is also built via fpm so the
  # fpm manifest cannot drift from the CMake build.
  fortran:
    name: Fortran (Linux)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    env:
      CARGO_C_VERSION: "0.10.21"
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      # The CI image carries a C/C++ toolchain (used by the cpp + cargo-c
      # jobs) but not gfortran; install it here so the image stays lean.
      - name: Install gfortran
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends gfortran
          apt-get clean && rm -rf /var/lib/apt/lists/*

      - name: Install cargo-c
        run: cargo install cargo-c --version "$CARGO_C_VERSION" --locked --features vendored-openssl

      - name: Install the tensogram C ABI (cargo-c) and expose via pkg-config
        run: |
          PFX="$GITHUB_WORKSPACE/.ffi-prefix"
          cargo cinstall --release -p tensogram-ffi --prefix="$PFX" --libdir=lib
          echo "PKG_CONFIG_PATH=$PFX/lib/pkgconfig" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PFX/lib" >> "$GITHUB_ENV"

      # Build the Python binding so the Fortran<->Python parity tests in the
      # CMake suite are actually exercised (they are skipped when `import
      # tensogram` fails). Put the venv's python first on PATH so CMake's
      # find_program(python3) discovers the binding-bearing interpreter.
      - name: Set up the Python binding (for Fortran<->Python parity)
        run: |
          uv python install 3.13
          uv venv .venv --python 3.13
          . .venv/bin/activate
          uv pip install maturin numpy
          cd python/bindings && maturin develop && cd ../..
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Build + test the Fortran binding (CMake + CTest)
        run: make fortran-test

      # Fortran 2008 conformance gate: the binding library must keep compiling
      # under -std=f2008 -Wall -Wextra -Werror (no assumed-rank / SELECT RANK).
      # Library only — examples/tests declare handle locals that trip gfortran's
      # f08/0011 advisory under -std=f2008 (valid F2008; see fortran/CMakeLists.txt).
      - name: Check the Fortran binding compiles under -std=f2008 (library gate)
        run: make fortran-f2008-check

      # fpm has no pkg-config integration, so the flags are injected by the
      # make target. This compiles the binding through the fpm manifest as a
      # drift check against the (authoritative) CMake build.
      - name: Build the Fortran binding via fpm (drift check)
        run: |
          FPM_VERSION=0.10.0
          mkdir -p "$HOME/.local/bin"
          # v0.10.0 ships a single statically-linked binary named
          # fpm-<ver>-linux-x86_64 (the -gcc-12 suffix only appears on newer
          # releases). The static build avoids a libgfortran runtime dependency.
          curl -fsSL -o "$HOME/.local/bin/fpm" \
            "https://github.com/fortran-lang/fpm/releases/download/v${FPM_VERSION}/fpm-${FPM_VERSION}-linux-x86_64"
          chmod +x "$HOME/.local/bin/fpm"
          export PATH="$HOME/.local/bin:$PATH"
          make fortran-fpm-test

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" build target .ffi-prefix .venv fortran/build

  # ── C++: macOS ─────────────────────────────────────────────────
  cpp-macos:
    name: C++ (macOS)
    # GitHub-hosted arm64 macOS (self-hosted runner offline). sccache disabled
    # — its ECMWF-internal backend is unreachable from GitHub-hosted runners.
    runs-on: macos-14
    env:
      RUSTC_WRAPPER: ""
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"
      - uses: dtolnay/rust-toolchain@stable

      - name: Build and test
        run: |
          cargo build --release -p tensogram-ffi
          cmake -S cpp -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j
          ctest --test-dir build --output-on-failure

  # ── Remote parity: Rust ↔ TS HTTP Range parity harness ────────
  # Drives both backends against a Python mock server (see
  # tests/remote-parity/) and asserts request-shape parity.
  # `make remote-parity` builds the rust_driver (isolated cargo
  # workspace), the TS package, the Python bindings, and runs pytest.
  remote-parity:
    name: Remote parity (Rust ↔ TS)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      - name: Set up Python toolchain
        run: |
          uv python install 3.13
          uv venv .venv --python 3.13

      - name: Build harness (drivers + bindings)
        run: make remote-parity-build

      # The orchestrator (run_parity.py) and fixture scanner both
      # `import tensogram`, which must be the freshly-built local
      # binding — not whatever release is on PyPI.  `maturin develop`
      # does an editable install (puts a .pth in site-packages
      # pointing to the source tree), so the canonical loaded path
      # is `python/bindings/python/tensogram/__init__.py`.  In the
      # regression scenario `python-build` was guarding against,
      # `tensogram` ends up resolved from PyPI under
      # `.venv/lib/.../site-packages/tensogram/__init__.py` instead.
      # Assert the editable path; reject anything else.
      - name: Verify local tensogram binding is loaded
        run: |
          . .venv/bin/activate
          python - <<'EOF'
          import pathlib, tensogram
          src = pathlib.Path(tensogram.__file__).resolve()
          expected = pathlib.Path("python/bindings/python/tensogram/__init__.py").resolve()
          assert src == expected, (
              f"tensogram from {src}, expected editable install at {expected}\n"
              "If `make python-build`'s maturin invocation changed, update this assertion."
          )
          print("tensogram from:", src)
          EOF

      - name: Run parity suite
        run: |
          . .venv/bin/activate
          uv pip install pytest numpy
          python -m pytest tests/remote-parity/ -v

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: |
          rm -rf "$TMPDIR" .venv target \
                 tests/remote-parity/drivers/rust_driver/target \
                 tests/remote-parity/drivers/node_modules \
                 typescript/node_modules typescript/dist typescript/wasm

  # ── WASM: build + test ────────────────────────────────────────
  wasm:
    name: WASM
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      - name: Build and test
        run: make wasm-test

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" target

  # ── TypeScript: wrapper build, typecheck, vitest ──────────────
  typescript:
    name: TypeScript
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      - name: Install typescript deps
        run: make ts-install

      - name: npm audit (typescript wrapper)
        working-directory: typescript
        run: npm audit --audit-level=moderate

      - name: Build WASM + TypeScript (wasm-pack → typescript/wasm, tsc → dist)
        run: make ts-build

      - name: Typecheck (strict, src + tests)
        run: make ts-typecheck

      - name: Run tests (vitest)
        run: make ts-test

      - name: Smoke-test examples
        run: |
          cd examples/typescript
          npm install --no-audit --no-fund
          npm audit --audit-level=moderate
          npx tsx 01_encode_decode.ts
          npx tsx 02_mars_metadata.ts
          npx tsx 02b_generic_metadata.ts
          npx tsx 03_multi_object.ts
          npx tsx 05_streaming_fetch.ts
          npx tsx 06_file_api.ts
          npx tsx 07_hash_and_errors.ts

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" target typescript/node_modules typescript/dist typescript/wasm examples/typescript/node_modules

  # ── Tensoscope: vitest unit tests ────────────────────────────────
  tensoscope:
    name: Tensoscope
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p "$TMPDIR"

      # tensoscope depends on @ecmwf.int/tensogram via file:../typescript;
      # vitest cannot resolve the package until the wrapper is built.
      - name: Install typescript deps
        run: make ts-install
      - name: Build WASM + TypeScript (wasm-pack → typescript/wasm, tsc → dist)
        run: make ts-build

      - name: Install tensoscope deps
        working-directory: tensoscope
        run: npm ci || npm install --no-audit --no-fund

      - name: npm audit (tensoscope)
        working-directory: tensoscope
        run: npm audit --audit-level=moderate

      - name: Run tests (vitest)
        working-directory: tensoscope
        run: npm test

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" target tensoscope/node_modules typescript/node_modules typescript/dist typescript/wasm

  # ── Mutation testing (PR diff only, non-blocking) ──────────────
  # Runs on ECMWF self-hosted infrastructure to avoid burning
  # GitHub-Actions minutes on every PR push.  Container matches the
  # rest of the test matrix (libaec, libnetcdf, eccodes etc. pre-built).
  #
  # DISABLED by default.  `make mutants-diff` hard-codes
  # `--features async,remote`, which cargo-mutants applies to whatever
  # package the diff touches — but only the core `tensogram` crate has a
  # `remote` feature, so a diff confined to `tensogram-ffi` (whose remote
  # surface is `async-remote`) fails to build before any mutant is tested.
  # Re-enable by setting the `RUN_MUTANTS` repository variable to `true`
  # (Settings → Secrets and variables → Actions → Variables), or by
  # restoring the `github.event_name == 'pull_request'` guard, once the
  # feature selection is made per-package.
  mutants-diff:
    name: Mutants (diff)
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    if: ${{ vars.RUN_MUTANTS == 'true' }}
    timeout-minutes: 30
    # Override the workflow-wide TMPDIR (which sits inside the workspace
    # at $GITHUB_WORKSPACE/.tmp) for this job only.  cargo-mutants copies
    # the workspace into a tempdir under TMPDIR; if TMPDIR is inside the
    # workspace, the copy walks its own freshly-created tempdir and
    # recurses until macOS / Linux PATH_MAX kicks in with
    # "File name too long".  /tmp is outside the workspace and free of
    # this trap.
    env:
      TMPDIR: /tmp
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need base branch for --in-diff
      - run: mkdir -p "$TMPDIR"
      - name: Compute diff vs base
        # Generated here rather than inside `make mutants-diff` so the
        # `actions/checkout`-set `safe.directory` config applies (it's
        # configured on the host runner, not always inherited into the
        # Docker container — manifests as "Not a git repository" when
        # git is invoked from inside the container's recipe shell).
        run: |
          git -c safe.directory='*' diff \
            origin/${{ github.base_ref }}...HEAD \
            > "$TMPDIR/mutants-diff.patch"
      - name: Mutate diff vs base
        # `make mutants-diff` runs cargo-mutants with the project's
        # seven concurrency clamps applied; only `MUTANTS_JOBS` is
        # tunable (the others are pinned at 1/-j1 to prevent the
        # nested-fan-out load spikes documented in
        # docs/src/dev/mutation-testing.md "Concurrency").
        run: make mutants-diff DIFF_FILE="$TMPDIR/mutants-diff.patch" MUTANTS_JOBS=4
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutants-diff-output
          path: mutants.out/
