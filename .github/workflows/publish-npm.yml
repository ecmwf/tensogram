name: Publish TypeScript package to npm

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  TMPDIR: ${{ github.workspace }}/.tmp

jobs:
  publish:
    name: Publish @ecmwf.int/tensogram
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    environment: npm
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - run: mkdir -p "$TMPDIR"

      - name: Install typescript deps
        run: make ts-install

      - name: Build WASM + TypeScript (wasm-pack → typescript/wasm, tsc → dist)
        run: make ts-build

      - name: Verify the wasm blob is in the publishable tarball
        working-directory: typescript
        # Regression guard. wasm-pack writes a `.gitignore` ("*") into its
        # output directory; npm honours that nested ignore file when packing
        # and silently drops the entire wasm/ directory from the tarball
        # (this is what shipped broken in @ecmwf.int/tensogram@0.21.0). The
        # package's `prepack` script removes that file before packing; this
        # step proves the resulting tarball actually carries the wasm blob,
        # failing the publish loudly rather than shipping an unusable package.
        run: |
          npm pack --dry-run --json > pack.json
          node -e "const f=require('./pack.json')[0].files.map(x=>x.path); if(!f.includes('wasm/tensogram_wasm_bg.wasm')){console.error('FATAL: wasm blob missing from npm tarball. wasm/ entries present:', f.filter(p=>p.startsWith('wasm'))); process.exit(1);} console.log('ok: wasm blob present in tarball');"
          rm -f pack.json

      - name: Check if version already published
        id: version-check
        run: |
          VERSION=$(node -e "process.stdout.write(require('./typescript/package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://registry.npmjs.org/%40ecmwf.int%2Ftensogram/$VERSION")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "@ecmwf.int/tensogram@$VERSION is already on npmjs.com — skipping"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "@ecmwf.int/tensogram@$VERSION not found on npmjs.com — will publish"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.already_published == 'false'
        working-directory: typescript
        env:
          # Named TEMPORARY_NPMJS_APIKEY because the plan is to migrate to
          # npm trusted publishing (OIDC, no long-lived token) once it is
          # available for the @ecmwf.int scope. Until that migration lands
          # this secret is the production credential and is safe to use.
          NODE_AUTH_TOKEN: ${{ secrets.TEMPORARY_NPMJS_APIKEY }}
        run: |
          cp ../LICENSE ./LICENSE
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm publish

      - name: Cleanup
        if: always()
        run: rm -f typescript/.npmrc && rm -rf "$TMPDIR" typescript/node_modules typescript/dist typescript/wasm
