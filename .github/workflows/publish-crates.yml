name: Publish Rust crates to crates.io

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish all crates
    runs-on: ubuntu-24.04
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (eccodes + netcdf)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libeccodes-dev libnetcdf-dev

      # ── Helper: publish a single crate, skip if already on crates.io ──
      # Usage: publish_crate <crate-name> [extra-args...]
      - name: Define publish helper
        id: helper
        run: |
          cat > /tmp/publish-crate.sh << 'SCRIPT'
          #!/bin/bash
          set -euo pipefail
          CRATE="$1"; shift
          VERSION=$(cargo metadata --no-deps --format-version=1 | \
            python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; print([p['version'] for p in pkgs if p['name']=='$CRATE'][0])" 2>/dev/null || true)

          if [ -z "$VERSION" ]; then
            MANIFEST=$(find rust -name Cargo.toml -path "*/$CRATE/*" | head -1)
            VERSION=$(grep '^version' "$MANIFEST" | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi

          # Sparse index path: 1-char → 1/, 2-char → 2/, 3-char → 3/first-char/,
          # 4+ chars → first-two/next-two/
          sparse_index_path() {
            local name="$1" len=${#1}
            if [ "$len" -le 2 ]; then echo "$len/$name"
            elif [ "$len" -eq 3 ]; then echo "3/${name:0:1}/$name"
            else echo "${name:0:2}/${name:2:2}/$name"
            fi
          }
          INDEX_URL="https://index.crates.io/$(sparse_index_path "$CRATE")"

          echo "::group::$CRATE@$VERSION"
          if curl -sfS "$INDEX_URL" 2>/dev/null | grep -q "\"vers\":\"$VERSION\""; then
            echo "Already published — skipping"
            echo "::endgroup::"
            exit 0
          fi
          echo "Publishing $CRATE@$VERSION ..."
          cargo publish "$@"
          echo "::endgroup::"

          echo "Waiting for sparse index ..."
          for i in $(seq 1 60); do
            if curl -sfS -H "Accept: application/json" \
                "$INDEX_URL" 2>/dev/null | grep -q "\"vers\":\"$VERSION\""; then
              echo "Indexed after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::warning::Index poll timed out for $CRATE — continuing anyway"
          SCRIPT
          chmod +x /tmp/publish-crate.sh

      # ── Publish in strict dependency order ─────────────────────────────
      - name: "1/11 — tensogram-szip"
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: /tmp/publish-crate.sh tensogram-szip -p tensogram-szip

      - name: "2/11 — tensogram-sz3-sys"
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: /tmp/publish-crate.sh tensogram-sz3-sys -p tensogram-sz3-sys

      - name: "3/11 — tensogram-sz3"
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: /tmp/publish-crate.sh tensogram-sz3 -p tensogram-sz3

      - name: "4/11 — tensogram-encodings"
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: /tmp/publish-crate.sh tensogram-encodings -p tensogram-encodings

      - name: "5/11 — tensogram"
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: /tmp/publish-crate.sh tensogram -p tensogram

      - name: "6/11 — tensogram-grib"
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: /tmp/publish-crate.sh tensogram-grib --manifest-path rust/tensogram-grib/Cargo.toml --no-verify

      - name: "7/11 — tensogram-netcdf"
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: /tmp/publish-crate.sh tensogram-netcdf --manifest-path rust/tensogram-netcdf/Cargo.toml --no-verify

      - name: "8/11 — tensogram-ffi"
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: /tmp/publish-crate.sh tensogram-ffi -p tensogram-ffi

      - name: "9/11 — tensogram-cli"
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: /tmp/publish-crate.sh tensogram-cli -p tensogram-cli

      - name: "10/11 — tensogram-wasm"
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: /tmp/publish-crate.sh tensogram-wasm --manifest-path rust/tensogram-wasm/Cargo.toml --no-verify

      - name: "11/11 — tensogram-core (redirect)"
        env: { CARGO_REGISTRY_TOKEN: "${{ secrets.CARGO_REGISTRY_TOKEN }}" }
        run: /tmp/publish-crate.sh tensogram-core --manifest-path rust/tensogram-core-redirect/Cargo.toml --no-verify
