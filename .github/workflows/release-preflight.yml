name: Release preflight

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Expected version (e.g. 0.14.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  TMPDIR: ${{ github.workspace }}/.tmp
  RUSTC_WRAPPER: sccache
  SCCACHE_BUCKET: tensogram-ci-cache
  SCCACHE_ENDPOINT: "https://object-store.os-api.cci1.ecmwf.int"
  SCCACHE_REGION: us-east-1
  SCCACHE_S3_USE_SSL: "true"
  SCCACHE_S3_KEY_PREFIX: tensogram/
  SCCACHE_BASEDIRS: ${{ github.workspace }}
  SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
  AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

jobs:
  preflight:
    name: Validate release readiness
    runs-on: [self-hosted, Linux, platform-builder-docker-xl, platform-builder-Ubuntu-22.04]
    container:
      image: eccr.ecmwf.int/tensogram/ci:1.3.0
      credentials:
        username: ${{ secrets.ECMWF_DOCKER_REGISTRY_USERNAME }}
        password: ${{ secrets.ECMWF_DOCKER_REGISTRY_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - run: mkdir -p "$TMPDIR"

      - name: Install system dependencies (libeccodes + libnetcdf + libhdf5)
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            libeccodes-dev libnetcdf-dev libhdf5-dev
          apt-get clean && rm -rf /var/lib/apt/lists/*

      - name: Check version consistency
        run: |
          EXPECTED="${{ inputs.version }}"
          echo "Expected version: $EXPECTED"
          ERRORS=0

          check_version() {
            local file="$1" actual="$2"
            if [ "$actual" != "$EXPECTED" ]; then
              echo "::error file=$file::Version mismatch: got '$actual', expected '$EXPECTED'"
              ERRORS=$((ERRORS + 1))
            fi
          }

          check_version "VERSION" "$(cat VERSION)"

          # Workspace root [workspace.package] version. Since #74 the in-workspace
          # member crates (rust/tensogram, rust/tensogram-encodings,
          # rust/tensogram-szip, rust/tensogram-sz3, rust/tensogram-sz3-sys,
          # rust/tensogram-cli, rust/tensogram-ffi, rust/benchmarks,
          # examples/rust) inherit via `version.workspace = true`, so this single
          # check covers all of them.
          WS_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          check_version "Cargo.toml [workspace.package]" "$WS_VER"

          # Excluded crates: not workspace members (PyO3 needs the Python
          # linker, GRIB/NetCDF/WASM each link against incompatible C libs /
          # target the wasm32 platform). Each has an explicit
          # `version = "X.Y.Z"` that must be bumped individually.
          for toml in \
            python/bindings/Cargo.toml \
            rust/tensogram-grib/Cargo.toml \
            rust/tensogram-netcdf/Cargo.toml \
            rust/tensogram-wasm/Cargo.toml; do
            VER=$(grep '^version' "$toml" | head -1 | sed 's/.*"\(.*\)"/\1/')
            check_version "$toml" "$VER"
          done

          for pytoml in \
            python/bindings/pyproject.toml \
            python/tensogram-xarray/pyproject.toml \
            python/tensogram-zarr/pyproject.toml \
            python/tensogram-anemoi/pyproject.toml; do
            VER=$(grep '^version' "$pytoml" | head -1 | sed 's/.*"\(.*\)"/\1/')
            check_version "$pytoml" "$VER"
          done

          for pkgjson in \
            typescript/package.json \
            examples/typescript/package.json; do
            VER=$(grep -m1 '"version"' "$pkgjson" | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')
            check_version "$pkgjson" "$VER"
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS version mismatches found"
            exit 1
          fi
          echo "All versions match $EXPECTED"

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        run: |
          cargo clippy --workspace --all-targets -- -D warnings
          cargo clippy -p tensogram --all-targets --features "remote,async" -- -D warnings
          cargo clippy -p tensogram-cli --all-targets --features "grib,netcdf" -- -D warnings
          cargo clippy --manifest-path rust/tensogram-netcdf/Cargo.toml --all-targets -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace

      - name: cargo test (feature coverage)
        run: |
          cargo test -p tensogram --features remote
          cargo test -p tensogram --features "remote,async"

      - name: cargo test (excluded crates)
        run: |
          cargo test --manifest-path rust/tensogram-grib/Cargo.toml
          cargo test --manifest-path rust/tensogram-netcdf/Cargo.toml
          cargo test -p tensogram-cli --features grib
          cargo test -p tensogram-cli --features netcdf

      - name: Verify crate tarballs
        run: |
          for crate in tensogram-szip tensogram-sz3-sys tensogram-sz3 \
                       tensogram-encodings tensogram tensogram-ffi \
                       tensogram-cli; do
            echo "::group::cargo package -p $crate"
            cargo package -p "$crate" --list
            echo "::endgroup::"
          done

          for crate in tensogram-grib tensogram-netcdf tensogram-wasm; do
            echo "::group::cargo package --manifest-path rust/$crate/Cargo.toml"
            cargo package --manifest-path "rust/$crate/Cargo.toml" --list --allow-dirty
            echo "::endgroup::"
          done

      - name: Install cargo-c
        env:
          CARGO_C_VERSION: "0.10.21"
        # vendored-openssl: ECMWF CI image lacks libssl-dev (see ci.yml's
        # cargo-c job for full rationale).
        run: cargo install cargo-c --version "$CARGO_C_VERSION" --locked --features vendored-openssl

      - name: Build and smoke test C API
        run: |
          cargo cbuild --release -p tensogram-ffi
          BASE=target/x86_64-unknown-linux-gnu/release
          for f in libtensogram.so libtensogram.a tensogram.pc include/tensogram/tensogram.h; do
            test -e "$BASE/$f" || { echo "::error::missing $BASE/$f"; exit 1; }
          done
          # Header drift would break consumers using the cargo-c-installed
          # header against a binary built from cargo build's tensogram.h.
          diff -u rust/tensogram-ffi/tensogram.h \
                  "$BASE/include/tensogram/tensogram.h"
          # --libdir=lib pins the install layout so the smoke script's
          # $PFX/lib/pkgconfig assumption holds on Debian multiarch.
          PFX="$(mktemp -d)"
          cargo cinstall --release -p tensogram-ffi --prefix="$PFX" --libdir=lib
          bash cpp/tests/test_cargo_c_smoke.sh "$PFX"

      - name: Dry-run publish (leaf crates only)
        env: { CARGO_REGISTRY_TOKEN: "dry-run-placeholder" }
        run: |
          cargo publish --dry-run -p tensogram-szip
          cargo publish --dry-run -p tensogram-sz3-sys

      - name: Set up Python + build tooling (via uv)
        run: |
          uv python install 3.13
          uv venv .venv --python 3.13
          . .venv/bin/activate
          uv pip install "maturin[patchelf]" build twine
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Build Python wheel (native extension)
        run: |
          . .venv/bin/activate
          cd python/bindings
          maturin build --release --features grib,netcdf

      - name: Build pure Python packages
        run: |
          . .venv/bin/activate
          python -m build python/tensogram-xarray/
          python -m build python/tensogram-zarr/

      - name: Validate Python packages
        run: |
          . .venv/bin/activate
          twine check \
            python/bindings/target/wheels/*.whl \
            python/tensogram-xarray/dist/* \
            python/tensogram-zarr/dist/*

      - name: sccache stats
        if: always()
        run: sccache --show-adv-stats

      - name: Cleanup
        if: always()
        run: rm -rf "$TMPDIR" target
